<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Manage Certifications - Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> -->

  <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
  <!-- <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"> -->

  <link rel="stylesheet" href="../assets/css/all.min.css">
  <link href="../assets/css/styles.css" rel="stylesheet">
  <style>
    .admin-sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 250px;
      background-color: #0f0f0f;
      border-right: 1px solid #2b2b2b;
      padding: 2rem 0;
      z-index: 1000;
      overflow-y: auto;
    }

    .admin-content {
      margin-left: 250px;
      padding: 2rem;
    }

    .admin-nav-link {
      display: block;
      padding: 0.75rem 1.5rem;
      color: #cfcfcf;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .admin-nav-link:hover,
    .admin-nav-link.active {
      background-color: #1a1a1a;
      color: #00bfa6;
      border-left: 3px solid #00bfa6;
    }

    .admin-nav-link i {
      width: 20px;
      margin-right: 0.75rem;
    }

    .image-preview {
      max-width: 300px;
      max-height: 300px;
      border: 1px solid #2b2b2b;
      border-radius: 0.5rem;
      margin-top: 1rem;
    }

    @media (max-width: 768px) {
      .admin-sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s ease;
      }

      .admin-sidebar.show {
        transform: translateX(0);
      }

      .admin-content {
        margin-left: 0;
      }
    }
  </style>
</head>

<body class="bg-black text-light" style="font-family:Inter, system-ui, sans-serif;">

  <!-- Sidebar -->
  <nav class="admin-sidebar" id="adminSidebar">
    <div class="px-3 mb-4">
      <h4 class="text-accent">
        <i class="fas fa-code"></i> Cyber Samurai
      </h4>
      <small class="text-secondary">Admin Panel</small>
    </div>
    <a href="index.html" class="admin-nav-link">
      <i class="fas fa-tachometer-alt"></i> Dashboard
    </a>
    <a href="projects.html" class="admin-nav-link">
      <i class="fas fa-briefcase"></i> Projects
    </a>
    <a href="blog.html" class="admin-nav-link">
      <i class="fas fa-blog"></i> Blog Posts
    </a>
    <a href="testimonials.html" class="admin-nav-link">
      <i class="fas fa-comments"></i> Testimonials
    </a>
    <a href="services.html" class="admin-nav-link">
      <i class="fas fa-cogs"></i> Services
    </a>
    <a href="certifications.html" class="admin-nav-link active">
      <i class="fas fa-certificate"></i> Certifications
    </a>
    <div class="mt-4 px-3">
      <a href="../index.html" class="admin-nav-link">
        <i class="fas fa-home"></i> Back to Site
      </a>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="admin-content">
    <!-- Mobile Menu Toggle -->
    <button class="btn btn-outline-primary d-md-none mb-3" id="sidebarToggle">
      <i class="fas fa-bars"></i> Menu
    </button>

    <h1 class="mb-4">Manage Certifications</h1>
    <div class="col-12 d-flex justify-content-start">
      <a href="certifications.html" class="btn btn-primary mb-3"><i class="fas fa-arrow-left"></i></a>
    </div>

    <!-- Add/Edit Certification Form -->
    <div class="card mb-4">
      <div class="card-body">
        <h5 class="card-title mb-4">Add New Certification</h5>
        <form id="certificationForm">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="certTitle" class="form-label">Certificate Title *</label>
              <input type="text" class="form-control" id="certTitle" required>
            </div>
            <div class="col-md-6 mb-3">
              <label for="certOrg" class="form-label">Issued By *</label>
              <input type="text" class="form-control" id="certOrg" required>
            </div>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="certYear" class="form-label">Year *</label>
              <input type="number" class="form-control" id="certYear" min="2000" max="2030" required>
            </div>
            <div class="col-md-6 mb-3">
              <label for="certMonth" class="form-label">Month (Optional)</label>
              <select class="form-control" id="certMonth">
                <option value="">Select month</option>
                <option value="January">January</option>
                <option value="February">February</option>
                <option value="March">March</option>
                <option value="April">April</option>
                <option value="May">May</option>
                <option value="June">June</option>
                <option value="July">July</option>
                <option value="August">August</option>
                <option value="September">September</option>
                <option value="October">October</option>
                <option value="November">November</option>
                <option value="December">December</option>
              </select>
            </div>
          </div>
          <div class="mb-3">
            <label for="certImage" class="form-label">Certificate Image</label>
            <input type="file" class="form-control" id="certImage" accept="image/*">
            <div id="certImagePreview"></div>
          </div>
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i> Save Certification
          </button>
          <button type="button" class="btn btn-outline-secondary" id="resetCertForm">
            <i class="fas fa-redo"></i> Reset
          </button>
        </form>
      </div>
    </div>

  
  </div>

  <!-- <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script> -->
  <script src="../assets/js/jquery.js"></script>
  <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> -->
  <script src="../assets/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/all.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    $(document).ready(function () {
      // Sidebar toggle
      $('#sidebarToggle').on('click', function () {
        $('#adminSidebar').toggleClass('show');
      });

      // Image preview
      $('#certImage').on('change', function (e) {
        var file = e.target.files[0];
        if (file) {
          var reader = new FileReader();
          reader.onload = function (e) {
            $('#certImagePreview').html('<img src="' + e.target.result + '" class="image-preview" alt="Certificate">');
          };
          reader.readAsDataURL(file);
        }
      });

      // Store certifications in browser memory
      var certifications = JSON.parse(localStorage.getItem('adminCertifications') || '[]');

      var adminTable = new AdminTable({
        data: certifications,
        tableBody: '#certificationsTableBody',
        searchFields: ['title', 'org', 'year', 'id'],
        sortField: 'title',
        rowRender: function(cert, index) {
          var date = cert.month ? cert.month + ' ' + cert.year : cert.year;
          return '<tr>' +
            '<td>' + (index + 1) + '</td>' +
            '<td>' + (cert.id || '') + '</td>' +
            '<td>' + cert.title + '</td>' +
            '<td>' + cert.org + '</td>' +
            '<td>' + date + '</td>' +
            '<td>' +
            '<button class="btn btn-sm btn-outline-primary me-2 edit-cert" data-index="' + index + '"><i class="fas fa-edit"></i></button>' +
            '<button class="btn btn-sm btn-outline-danger delete-cert" data-index="' + index + '"><i class="fas fa-trash"></i></button>' +
            '</td>' +
            '</tr>';
        }
      });

      // Render certifications table
      function renderCertifications() {
        adminTable.setData(certifications);
      }

      // Form submission
      $('#certificationForm').on('submit', function (e) {
        e.preventDefault();

        var certification = {
          title: $('#certTitle').val(),
          org: $('#certOrg').val(),
          year: $('#certYear').val(),
          month: $('#certMonth').val() || '',
          image: $('#certImagePreview img').attr('src') || ''
        };

        var editIndex = $('#certificationForm').data('edit-index');
        if (editIndex !== undefined) {
          certifications[editIndex] = certification;
          $('#certificationForm').removeData('edit-index');
        } else {
          certifications.push(certification);
        }

        localStorage.setItem('adminCertifications', JSON.stringify(certifications));
        renderCertifications();

        var alert = $('<div class="alert alert-success alert-dismissible fade show" role="alert">' +
          'Certification saved successfully!' +
          '<button type="button" class="btn-close" data-bs-dismiss="alert"></button>' +
          '</div>');
        $('.admin-content').prepend(alert);
        setTimeout(function () { alert.fadeOut(function () { $(this).remove(); }); }, 3000);

        $('#certificationForm')[0].reset();
        $('#certImagePreview').empty();
      });

      // Edit certification
      $(document).on('click', '.edit-cert', function () {
        var index = $(this).data('index');
        var cert = certifications[index];

        $('#certTitle').val(cert.title);
        $('#certOrg').val(cert.org);
        $('#certYear').val(cert.year);
        $('#certMonth').val(cert.month || '');

        if (cert.image) {
          $('#certImagePreview').html('<img src="' + cert.image + '" class="image-preview" alt="Certificate">');
        }

        $('#certificationForm').data('edit-index', index);
        $('html, body').animate({ scrollTop: 0 }, 500);
      });

      // Delete certification
      $(document).on('click', '.delete-cert', function () {
        if (confirm('Are you sure you want to delete this certification?')) {
          var index = $(this).data('index');
          certifications.splice(index, 1);
          localStorage.setItem('adminCertifications', JSON.stringify(certifications));
          renderCertifications();
        }
      });

      // Reset form
      $('#resetCertForm').on('click', function () {
        $('#certificationForm')[0].reset();
        $('#certImagePreview').empty();
        $('#certificationForm').removeData('edit-index');
      });

      // Initial render
      renderCertifications();
    });
  </script>
</body>

</html>
