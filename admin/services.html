<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Manage Services - Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
   <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> -->

  <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
  <!-- <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"> -->

  <link rel="stylesheet" href="../assets/css/all.min.css">
  <link href="../assets/css/styles.css" rel="stylesheet">
  <style>
    .admin-sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 250px;
      background-color: #0f0f0f;
      border-right: 1px solid #2b2b2b;
      padding: 2rem 0;
      z-index: 1000;
      overflow-y: auto;
    }
    .admin-content {
      margin-left: 250px;
      padding: 2rem;
    }
    .admin-nav-link {
      display: block;
      padding: 0.75rem 1.5rem;
      color: #cfcfcf;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .admin-nav-link:hover,
    .admin-nav-link.active {
      background-color: #1a1a1a;
      color: #00bfa6;
      border-left: 3px solid #00bfa6;
    }
    .admin-nav-link i {
      width: 20px;
      margin-right: 0.75rem;
    }
    .icon-preview {
      font-size: 3rem;
      color: #00bfa6;
      margin: 1rem 0;
    }
    @media (max-width: 768px) {
      .admin-sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s ease;
      }
      .admin-sidebar.show {
        transform: translateX(0);
      }
      .admin-content {
        margin-left: 0;
      }
    }
  </style>
</head>
<body class="bg-black text-light" style="font-family:Inter, system-ui, sans-serif;">
  
  <!-- Sidebar -->
  <nav class="admin-sidebar" id="adminSidebar">
    <div class="px-3 mb-4">
      <h4 class="text-accent">
        <i class="fas fa-code"></i> Cyber Samurai
      </h4>
      <small class="text-secondary">Admin Panel</small>
    </div>
    <a href="index.html" class="admin-nav-link">
      <i class="fas fa-tachometer-alt"></i> Dashboard
    </a>
    <a href="projects.html" class="admin-nav-link">
      <i class="fas fa-briefcase"></i> Projects
    </a>
    <a href="blog.html" class="admin-nav-link">
      <i class="fas fa-blog"></i> Blog Posts
    </a>
    <a href="testimonials.html" class="admin-nav-link">
      <i class="fas fa-comments"></i> Testimonials
    </a>
    <a href="services.html" class="admin-nav-link active">
      <i class="fas fa-cogs"></i> Services
    </a>
    <a href="certifications.html" class="admin-nav-link">
      <i class="fas fa-certificate"></i> Certifications
    </a>
    <div class="mt-4 px-3">
      <a href="../index.html" class="admin-nav-link">
        <i class="fas fa-home"></i> Back to Site
      </a>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="admin-content">
    <!-- Mobile Menu Toggle -->
    <button class="btn btn-outline-primary d-md-none mb-3" id="sidebarToggle">
      <i class="fas fa-bars"></i> Menu
    </button>

    <h1 class="mb-4">Manage Services</h1>
     <div class="col-12 d-flex justify-content-end">
      <a href="manage-services.html" class="btn btn-primary mb-3"> Add Service</a>
    </div>

  

    <!-- Services Table -->
    <div class="ma-admin-table-wrap ma-card p-3 p-md-4 mb-4 border border-secondary rounded">
      <h5 class="card-title mb-4">All Services</h5>
      <div class="d-flex flex-column flex-sm-row align-items-stretch align-items-sm-center justify-content-between gap-3 mb-3">
        <div class="d-flex align-items-center gap-5">
            <div class="d-flex align-items-center gap-2">
                <label class="text-secondary small mb-0 text-nowrap">Show</label>
                <select class="form-select form-select-sm js-admin-entries bg-dark text-light border-secondary" style="width: auto; min-width: 70px;">
                    <option value="5" selected>5</option>
                    <option value="10">10</option>
                    <option value="25">25</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
                <span class="text-secondary small text-nowrap">entries</span>
            </div>
            <div class="d-flex align-items-center gap-2">
                <label class="text-secondary small mb-0 text-nowrap fw-bold">Sort</label>
                <span class="ma-sort-controls">
                    <i class="fa-solid fa-arrow-up ma-sort-arrow small active" data-dir="asc" style="cursor: pointer;"></i>
                    <i class="fa-solid fa-arrow-down ma-sort-arrow small" data-dir="desc" style="cursor: pointer;"></i>
                </span>
            </div>
        </div>
        <div class="d-flex align-items-center">
            <input type="search" class="form-control form-control-sm js-admin-search bg-dark text-light border-secondary" placeholder="Search…" style="max-width: 220px;" />
        </div>
      </div>
      <div class="table-responsive">
          <table class="table table-dark table-hover align-middle mb-0" id="servicesTable">
            <thead>
              <tr>
                <th>S.No</th>
                <th>ID</th>
                <th>Icon</th>
                <th>Title</th>
                <th>Description</th>
                <th>Pricing</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="servicesTableBody">
              <!-- Services will be added here dynamically -->
            </tbody>
          </table>
        </div>
        <div class="d-flex flex-column flex-sm-row align-items-center justify-content-between gap-2 mt-3 pt-3 border-top border-secondary">
          <div class="text-secondary small js-admin-footer-info">Showing 0 to 0 of 0 entries</div>
          <ul class="pagination pagination-sm mb-0 js-admin-pagination"></ul>
        </div>
    </div>
  </div>

  <!-- <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script> -->
  <script src="../assets/js/jquery.js"></script>
  <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> -->
  <script src="../assets/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/all.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    $(document).ready(function() {
      // Sidebar toggle
      $('#sidebarToggle').on('click', function() {
        $('#adminSidebar').toggleClass('show');
      });

      // Icon preview
      $('#serviceIcon').on('input', function() {
        var iconClass = $(this).val().trim();
        if (iconClass) {
          // Remove 'fa-' prefix if present
          iconClass = iconClass.replace(/^fa-/, '');
          $('#iconPreview').html('<i class="fas fa-' + iconClass + '"></i>');
        } else {
          $('#iconPreview').html('<i class="fas fa-question"></i>');
        }
      });

      // Store services in browser memory
      var services = JSON.parse(localStorage.getItem('adminServices') || '[]');

      var adminTable = new AdminTable({
        data: services,
        tableBody: '#servicesTableBody',
        searchFields: ['title', 'description', 'id'],
        sortField: 'title',
        rowRender: function(service, index) {
          var iconHtml = '<i class="fas fa-' + service.icon + ' fa-2x text-accent"></i>';
          return '<tr>' +
            '<td>' + (index + 1) + '</td>' +
            '<td>' + (service.id || '') + '</td>' +
            '<td>' + iconHtml + '</td>' +
            '<td>' + service.title + '</td>' +
            '<td>' + (service.description.length > 100 ? service.description.substring(0, 100) + '...' : service.description) + '</td>' +
            '<td>' + (service.pricing || 'N/A') + '</td>' +
            '<td>' +
            '<button class="btn btn-sm btn-outline-primary me-2 edit-service" data-index="' + index + '"><i class="fas fa-edit"></i></button>' +
            '<button class="btn btn-sm btn-outline-danger delete-service" data-index="' + index + '"><i class="fas fa-trash"></i></button>' +
            '</td>' +
            '</tr>';
        }
      });

      // Render services table
      function renderServices() {
        adminTable.setData(services);
      }

      // Form submission
      $('#serviceForm').on('submit', function(e) {
        e.preventDefault();
        
        var iconClass = $('#serviceIcon').val().trim().replace(/^fa-/, '');

        var service = {
          title: $('#serviceTitle').val(),
          description: $('#serviceDescription').val(),
          icon: iconClass,
          pricing: $('#servicePricing').val() || ''
        };

        var editIndex = $('#serviceForm').data('edit-index');
        if (editIndex !== undefined) {
          services[editIndex] = service;
          $('#serviceForm').removeData('edit-index');
        } else {
          services.push(service);
        }

        localStorage.setItem('adminServices', JSON.stringify(services));
        renderServices();
        
        var alert = $('<div class="alert alert-success alert-dismissible fade show" role="alert">' +
          'Service saved successfully!' +
          '<button type="button" class="btn-close" data-bs-dismiss="alert"></button>' +
          '</div>');
        $('.admin-content').prepend(alert);
        setTimeout(function() { alert.fadeOut(function() { $(this).remove(); }); }, 3000);
        
        $('#serviceForm')[0].reset();
        $('#iconPreview').html('<i class="fas fa-question"></i>');
      });

      // Edit service
      $(document).on('click', '.edit-service', function() {
        var index = $(this).data('index');
        var service = services[index];
        
        $('#serviceTitle').val(service.title);
        $('#serviceDescription').val(service.description);
        $('#serviceIcon').val(service.icon);
        $('#servicePricing').val(service.pricing);
        $('#iconPreview').html('<i class="fas fa-' + service.icon + '"></i>');
        
        $('#serviceForm').data('edit-index', index);
        $('html, body').animate({ scrollTop: 0 }, 500);
      });

      // Delete service
      $(document).on('click', '.delete-service', function() {
        if (confirm('Are you sure you want to delete this service?')) {
          var index = $(this).data('index');
          services.splice(index, 1);
          localStorage.setItem('adminServices', JSON.stringify(services));
          renderServices();
        }
      });

      // Reset form
      $('#resetServiceForm').on('click', function() {
        $('#serviceForm')[0].reset();
        $('#iconPreview').html('<i class="fas fa-question"></i>');
        $('#serviceForm').removeData('edit-index');
      });

      // Initial render
      renderServices();
    });
  </script>
</body>
</html>
