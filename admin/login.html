<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
   <link rel="shortcut icon" href="../assets/images/icon.png" type="image/x-icon">
  <title>Admin Login - Cyber Samurai</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="../assets/css/styles.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #000000 0%, #0f0f0f 50%, #1a1a1a 100%);
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('data:image/svg+xml,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse"><path d="M 100 0 L 0 0 0 100" fill="none" stroke="%231a1a1a" stroke-width="1"/></pattern></defs><rect width="100" height="100" fill="url(%23grid)"/></svg>');
      opacity: 0.3;
      z-index: 0;
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 450px;
      padding: 2rem;
    }

    .login-card {
      background-color: #1a1a1a;
      border: 1px solid #2b2b2b;
      border-radius: 1rem;
      padding: 1rem 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      transition: all 0.3s ease;
    }

    .login-card:hover {
      border-color: #00bfa6;
      box-shadow: 0 12px 48px rgba(0, 191, 166, 0.2);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-logo h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: #00bfa6;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 4px rgba(255, 255, 255, 0.2);
      /*animation: iconPulse 2s ease-in-out infinite;*/
    }

    @keyframes logoGlow {
      from {
        text-shadow: 0 0 20px rgba(0, 191, 166, 0.5), 0 0 30px rgba(0, 191, 166, 0.3);
      }
      to {
        text-shadow: 0 0 30px rgba(0, 191, 166, 0.8), 0 0 40px rgba(0, 191, 166, 0.5), 0 0 50px rgba(0, 191, 166, 0.3);
      }
    }

    .login-logo p {
      color: #9aa0a6;
      font-size: 0.875rem;
      margin: 0;
    }

    .login-icon {
      font-size: 3rem;
      color: #00bfa6;
      margin-bottom: 1rem;
     /* animation: iconPulse 2s ease-in-out infinite;*/
    }

    @keyframes iconPulse {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.1);
        opacity: 0.8;
      }
    }

    .form-label {
      color: #cfcfcf;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .form-control {
      background-color: #0f0f0f;
      border: 1px solid #2b2b2b;
      color: #ffffff;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      transition: all 0.3s ease;
    }

    .form-control:focus {
      background-color: #1a1a1a;
      border-color: #00bfa6;
      color: #ffffff;
      box-shadow: 0 0 0 0.2rem rgba(0, 191, 166, 0.25);
    }

    .form-control::placeholder {
      color: #9aa0a6;
    }

    .input-group-text {
      background-color: #0f0f0f;
      border: 1px solid #2b2b2b;
      color: #9aa0a6;
      border-right: none;
    }

    .btn-login {
      width: 100%;
      height: 46px;
      padding: 0.75rem;
      background: linear-gradient(135deg, #00bfa6 0%, #009d87 100%);
      border: none;
      color: #000;
      font-weight: 600;
      border-radius: 0.5rem;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 191, 166, 0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login.loading {
      pointer-events: none;
    }

    .btn-login.loading::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 20px;
      height: 20px;
      margin: -10px 0 0 -10px;
      border: 2px solid #000;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-message {
      color: #ff6b6b;
      font-size: 0.875rem;
      margin-top: 0.25rem;
      display: none;
    }

    .form-control.is-invalid {
      border-color: #ff6b6b;
    }

    .success-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: fadeIn 0.3s ease;
    }

    .success-overlay.show {
      display: flex;
    }

    .success-content {
      text-align: center;
      color: #ffffff;
    }

    .success-icon {
      font-size: 4rem;
      color: #00bfa6;
      margin-bottom: 1rem;
      animation: successScale 0.5s ease;
    }

    @keyframes successScale {
      0% {
        transform: scale(0);
      }
      50% {
        transform: scale(1.2);
      }
      100% {
        transform: scale(1);
      }
    }

    .success-content h3 {
      color: #00bfa6;
      margin-bottom: 0.5rem;
    }

    .success-content p {
      color: #cfcfcf;
    }

    .spinner-border {
      width: 3rem;
      height: 3rem;
      border-width: 0.3rem;
      color: #00bfa6;
    }

    .security-badge {
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #2b2b2b;
    }

    .security-badge i {
      color: #00bfa6;
      margin-right: 0.5rem;
    }

    .security-badge small {
      color: #9aa0a6;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <i class="fas fa-shield-alt login-icon"></i>
        <h1><i class="fas fa-code"></i> Cyber Samurai</h1>
        <p>Admin Portal</p>
      </div>

      <form id="loginForm">
        <div class="mb-4">
          <label for="email" class="form-label">
            <i class="fas fa-envelope"></i> Email Address
          </label>
          <div class="input-group">
            <input type="email" class="form-control" id="email" name="email" placeholder="admin@cybersamurai.dev" required>
          </div>
          <div class="error-message" id="emailError"></div>
        </div>

        <div class="mb-4">
          <label for="password" class="form-label">
            <i class="fas fa-lock"></i> Password
          </label>
          <div class="input-group">
            <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
          </div>
          <div class="error-message" id="passwordError"></div>
        </div>

        <button type="submit" class="btn btn-login">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
      </form>

      <div class="security-badge">
        <i class="fas fa-shield-alt"></i>
        <small>Secure Admin Access</small>
      </div>
    </div>
  </div>

  <!-- Success Overlay -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-content">
      <div class="success-icon">
        <i class="fas fa-check-circle"></i>
      </div>
      <h3>Login Successful</h3>
      <p>Redirecting to dashboard...</p>
      <div class="spinner-border mt-3" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    $(document).ready(function() {
      // Form validation and submission
      $('#loginForm').on('submit', function(e) {
        e.preventDefault();
        
        var isValid = true;
        var email = $('#email').val().trim();
        var password = $('#password').val();
        
        // Remove previous error states
        $('.form-control').removeClass('is-invalid');
        $('.error-message').hide().text('');
        
        // Validate email
        var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (email === '') {
          showError('#email', 'Email is required');
          isValid = false;
        } else if (!emailRegex.test(email)) {
          showError('#email', 'Please enter a valid email address');
          isValid = false;
        }
        
        // Validate password
        if (password === '') {
          showError('#password', 'Password is required');
          isValid = false;
        } else if (password.length < 6) {
          showError('#password', 'Password must be at least 6 characters');
          isValid = false;
        }
        
        if (isValid) {
          // Show loading state
          var $btn = $('.btn-login');
          $btn.addClass('loading').html('');
          
          // Simulate login delay
          setTimeout(function() {
            // Show success overlay
            $('#successOverlay').addClass('show');
            
            // Redirect after animation
            setTimeout(function() {
              window.location.href = 'index.html';
            }, 2000);
          }, 1000);
        }
      });

      // Helper function to show errors
      function showError(selector, message) {
        $(selector).addClass('is-invalid');
        var errorId = selector.replace('#', '') + 'Error';
        $('#' + errorId).text(message).show();
      }

      // Remove error on input
      $('#email, #password').on('input', function() {
        $(this).removeClass('is-invalid');
        var fieldName = $(this).attr('id');
        $('#' + fieldName + 'Error').hide();
      });

      // Enter key to submit
      $('#email, #password').on('keypress', function(e) {
        if (e.which === 13) {
          $('#loginForm').submit();
        }
      });
    });
  </script>
</body>
</html>
