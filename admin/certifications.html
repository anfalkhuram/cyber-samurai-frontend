<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Manage Certifications - Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> -->

  <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
  <!-- <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"> -->

  <link rel="stylesheet" href="../assets/css/all.min.css">
  <link href="../assets/css/styles.css" rel="stylesheet">
  <style>
    .admin-sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 250px;
      background-color: #0f0f0f;
      border-right: 1px solid #2b2b2b;
      padding: 2rem 0;
      z-index: 1000;
      overflow-y: auto;
    }

    .admin-content {
      margin-left: 250px;
      padding: 2rem;
    }

    .admin-nav-link {
      display: block;
      padding: 0.75rem 1.5rem;
      color: #cfcfcf;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .admin-nav-link:hover,
    .admin-nav-link.active {
      background-color: #1a1a1a;
      color: #00bfa6;
      border-left: 3px solid #00bfa6;
    }

    .admin-nav-link i {
      width: 20px;
      margin-right: 0.75rem;
    }

    .image-preview {
      max-width: 300px;
      max-height: 300px;
      border: 1px solid #2b2b2b;
      border-radius: 0.5rem;
      margin-top: 1rem;
    }

    @media (max-width: 768px) {
      .admin-sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s ease;
      }

      .admin-sidebar.show {
        transform: translateX(0);
      }

      .admin-content {
        margin-left: 0;
      }
    }
  </style>
</head>

<body class="bg-black text-light" style="font-family:Inter, system-ui, sans-serif;">

  <!-- Sidebar -->
  <nav class="admin-sidebar" id="adminSidebar">
    <div class="px-3 mb-4">
      <h4 class="text-accent">
        <i class="fas fa-code"></i> Cyber Samurai
      </h4>
      <small class="text-secondary">Admin Panel</small>
    </div>
    <a href="index.html" class="admin-nav-link">
      <i class="fas fa-tachometer-alt"></i> Dashboard
    </a>
    <a href="projects.html" class="admin-nav-link">
      <i class="fas fa-briefcase"></i> Projects
    </a>
    <a href="blog.html" class="admin-nav-link">
      <i class="fas fa-blog"></i> Blog Posts
    </a>
    <a href="testimonials.html" class="admin-nav-link">
      <i class="fas fa-comments"></i> Testimonials
    </a>
    <a href="services.html" class="admin-nav-link">
      <i class="fas fa-cogs"></i> Services
    </a>
    <a href="certifications.html" class="admin-nav-link active">
      <i class="fas fa-certificate"></i> Certifications
    </a>
    <div class="mt-4 px-3">
      <a href="../index.html" class="admin-nav-link">
        <i class="fas fa-home"></i> Back to Site
      </a>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="admin-content">
    <!-- Mobile Menu Toggle -->
    <button class="btn btn-outline-primary d-md-none mb-3" id="sidebarToggle">
      <i class="fas fa-bars"></i> Menu
    </button>

    <h1 class="mb-4">Manage Certifications</h1>
    <div class="col-12 d-flex justify-content-end">
      <a href="manage-certifications.html" class="btn btn-primary mb-3">Add Certification</a>
    </div>


    <!-- Certifications Table -->
    <div class="ma-admin-table-wrap ma-card p-3 p-md-4 mb-4 border border-secondary rounded">
      <h5 class="card-title mb-4">All Certifications</h5>
      <div class="d-flex flex-column flex-sm-row align-items-stretch align-items-sm-center justify-content-between gap-3 mb-3">
        <div class="d-flex align-items-center gap-5">
            <div class="d-flex align-items-center gap-2">
                <label class="text-secondary small mb-0 text-nowrap">Show</label>
                <select class="form-select form-select-sm js-admin-entries bg-dark text-light border-secondary" style="width: auto; min-width: 70px;">
                    <option value="5" selected>5</option>
                    <option value="10">10</option>
                    <option value="25">25</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
                <span class="text-secondary small text-nowrap">entries</span>
            </div>
            <div class="d-flex align-items-center gap-2">
                <label class="text-secondary small mb-0 text-nowrap fw-bold">Sort</label>
                <span class="ma-sort-controls">
                    <i class="fa-solid fa-arrow-up ma-sort-arrow small active" data-dir="asc" style="cursor: pointer;"></i>
                    <i class="fa-solid fa-arrow-down ma-sort-arrow small" data-dir="desc" style="cursor: pointer;"></i>
                </span>
            </div>
        </div>
        <div class="d-flex align-items-center">
            <input type="search" class="form-control form-control-sm js-admin-search bg-dark text-light border-secondary" placeholder="Search…" style="max-width: 220px;" />
        </div>
      </div>
      <div class="table-responsive">
          <table class="table table-dark table-hover align-middle mb-0" id="certificationsTable">
            <thead>
              <tr>
                <th>S.No</th>
                <th>ID</th>
                <th>Title</th>
                <th>Issued By</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="certificationsTableBody">
              <!-- Certifications will be added here dynamically -->
            </tbody>
          </table>
        </div>
        <div class="d-flex flex-column flex-sm-row align-items-center justify-content-between gap-2 mt-3 pt-3 border-top border-secondary">
          <div class="text-secondary small js-admin-footer-info">Showing 0 to 0 of 0 entries</div>
          <ul class="pagination pagination-sm mb-0 js-admin-pagination"></ul>
        </div>
    </div>
  </div>

  <!-- <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script> -->
  <script src="../assets/js/jquery.js"></script>
  <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> -->
  <script src="../assets/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/all.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    $(document).ready(function () {
      // Sidebar toggle
      $('#sidebarToggle').on('click', function () {
        $('#adminSidebar').toggleClass('show');
      });

      // Image preview
      $('#certImage').on('change', function (e) {
        var file = e.target.files[0];
        if (file) {
          var reader = new FileReader();
          reader.onload = function (e) {
            $('#certImagePreview').html('<img src="' + e.target.result + '" class="image-preview" alt="Certificate">');
          };
          reader.readAsDataURL(file);
        }
      });

      // Store certifications in browser memory
      var certifications = JSON.parse(localStorage.getItem('adminCertifications') || '[]');

      var adminTable = new AdminTable({
        data: certifications,
        tableBody: '#certificationsTableBody',
        searchFields: ['title', 'org', 'year', 'id'],
        sortField: 'title',
        rowRender: function(cert, index) {
          var date = cert.month ? cert.month + ' ' + cert.year : cert.year;
          return '<tr>' +
            '<td>' + (index + 1) + '</td>' +
            '<td>' + (cert.id || '') + '</td>' +
            '<td>' + cert.title + '</td>' +
            '<td>' + cert.org + '</td>' +
            '<td>' + date + '</td>' +
            '<td>' +
            '<button class="btn btn-sm btn-outline-primary me-2 edit-cert" data-index="' + index + '"><i class="fas fa-edit"></i></button>' +
            '<button class="btn btn-sm btn-outline-danger delete-cert" data-index="' + index + '"><i class="fas fa-trash"></i></button>' +
            '</td>' +
            '</tr>';
        }
      });

      // Render certifications table
      function renderCertifications() {
        adminTable.setData(certifications);
      }

      // Form submission
      $('#certificationForm').on('submit', function (e) {
        e.preventDefault();

        var certification = {
          title: $('#certTitle').val(),
          org: $('#certOrg').val(),
          year: $('#certYear').val(),
          month: $('#certMonth').val() || '',
          image: $('#certImagePreview img').attr('src') || ''
        };

        var editIndex = $('#certificationForm').data('edit-index');
        if (editIndex !== undefined) {
          certifications[editIndex] = certification;
          $('#certificationForm').removeData('edit-index');
        } else {
          certifications.push(certification);
        }

        localStorage.setItem('adminCertifications', JSON.stringify(certifications));
        renderCertifications();

        var alert = $('<div class="alert alert-success alert-dismissible fade show" role="alert">' +
          'Certification saved successfully!' +
          '<button type="button" class="btn-close" data-bs-dismiss="alert"></button>' +
          '</div>');
        $('.admin-content').prepend(alert);
        setTimeout(function () { alert.fadeOut(function () { $(this).remove(); }); }, 3000);

        $('#certificationForm')[0].reset();
        $('#certImagePreview').empty();
      });

      // Edit certification
      $(document).on('click', '.edit-cert', function () {
        var index = $(this).data('index');
        var cert = certifications[index];

        $('#certTitle').val(cert.title);
        $('#certOrg').val(cert.org);
        $('#certYear').val(cert.year);
        $('#certMonth').val(cert.month || '');

        if (cert.image) {
          $('#certImagePreview').html('<img src="' + cert.image + '" class="image-preview" alt="Certificate">');
        }

        $('#certificationForm').data('edit-index', index);
        $('html, body').animate({ scrollTop: 0 }, 500);
      });

      // Delete certification
      $(document).on('click', '.delete-cert', function () {
        if (confirm('Are you sure you want to delete this certification?')) {
          var index = $(this).data('index');
          certifications.splice(index, 1);
          localStorage.setItem('adminCertifications', JSON.stringify(certifications));
          renderCertifications();
        }
      });

      // Reset form
      $('#resetCertForm').on('click', function () {
        $('#certificationForm')[0].reset();
        $('#certImagePreview').empty();
        $('#certificationForm').removeData('edit-index');
      });

      // Initial render
      renderCertifications();
    });
  </script>
</body>

</html>
